name: Deploy Flask App

on:
  workflow_run:
    workflows: ["Docker Build & Push"] # Must match the upstream workflow name EXACTLY
    types: [completed]
    branches:
      - main

jobs:
  deploy:
    # Only deploy when the upstream Docker Build & Push workflow SUCCEEDED
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
      DOCKER_TAG: ${{ github.sha }}

    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── STEP 1: System update ───────────────────────────────────────────────
      - name: Update apt packages
        run: |
          sudo apt-get update -y

      # ─── STEP 2: Install Docker (if not already installed) ──────────────────
      - name: Install Docker (if not present)
        run: |
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing..."
            sudo apt-get install -y ca-certificates curl gnupg lsb-release

            # Add Docker's official GPG key
            sudo install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
              | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            sudo chmod a+r /etc/apt/keyrings/docker.gpg

            # Add Docker repo
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
              https://download.docker.com/linux/ubuntu \
              $(lsb_release -cs) stable" \
              | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

            sudo apt-get update -y
            sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
            echo "Docker installation complete."
          else
            echo "Docker already installed: $(docker --version)"
          fi

      # ─── STEP 3: Install / upgrade Docker Compose plugin ────────────────────
      - name: Install Docker Compose plugin (if not present)
        run: |
          if ! docker compose version &> /dev/null; then
            echo "Docker Compose plugin not found. Installing..."
            sudo apt-get install -y docker-compose-plugin
            echo "Docker Compose plugin installed."
          else
            echo "Docker Compose already available: $(docker compose version)"
          fi

      # ─── STEP 4: Enable & restart Docker service ────────────────────────────
      - name: Enable and restart Docker service
        run: |
          sudo systemctl enable docker
          sudo systemctl restart docker
          sudo systemctl is-active --quiet docker && echo "Docker service is running ✅" || echo "Docker service FAILED to start ❌"

      # ─── STEP 5: Add runner user to docker group (no sudo needed for compose) ─
      - name: Add current user to docker group
        run: |
          sudo usermod -aG docker $USER || true
          # Refresh group membership in current shell session
          newgrp docker || true

      # ─── STEP 6: Write .env file (sudo strips env vars, .env file is the fix) ──
      - name: Write .env file for Docker Compose
        run: |
          # sudo drops environment variables, so we write them to .env
          # Docker Compose auto-reads .env from the project directory
          echo "DOCKERHUB_USER=${DOCKERHUB_USER}" > .env
          echo "DOCKER_TAG=${DOCKER_TAG}"        >> .env
          echo "─── .env contents (image details) ───"
          cat .env

      # ─── STEP 7: Deploy with Docker Compose ─────────────────────────────────
      - name: Deploy with Docker Compose
        run: |
          echo "Pulling image: ${DOCKERHUB_USER}/github-actions-app:${DOCKER_TAG}"
          # sudo -E preserves env vars AND .env file is also present as backup
          sudo -E docker compose down
          sudo -E docker compose up -d --force-recreate --pull always
          echo ""
          echo "=== Running containers ==="
          sudo docker ps
